# =============================================================================
# nginx.conf — Web server configuration for the frontend container
#
# nginx has two jobs here:
#   1. Serve the static frontend files (index.html, CSS, JS)
#   2. Proxy /api/* requests to the FastAPI backend container
#
# Why proxy through nginx instead of calling the API directly?
#   - The API container has NO published ports — it's only reachable inside
#     the Docker network. The browser can't reach it directly.
#   - nginx lives in the same Docker network, so it CAN reach api:8000.
#   - From the browser's perspective, there's only one server: nginx on port 80.
#
# Network flow:
#   Browser  ──[port 80]──►  nginx (frontend container)
#                                │
#                                ├── GET /          → serve index.html
#                                ├── GET /api/tools → proxy → api:8000/tools
#                                └── POST /api/...  → proxy → api:8000/...
# =============================================================================

events {
    # Maximum number of simultaneous connections per worker process.
    # 1024 is a safe default for a demo environment.
    worker_connections 1024;
}

http {
    # Include MIME type mappings so nginx sends the right Content-Type headers
    # (e.g., text/css for .css files, application/javascript for .js)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging — helps diagnose issues during the demo
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;    # Match any hostname

        # ------------------------------------------------------------------
        # Location 1: /api/ — proxy to FastAPI backend
        # ------------------------------------------------------------------
        location /api/ {
            # Strip the /api prefix before forwarding.
            # e.g., GET /api/tools/  →  GET /tools/  on api:8000
            proxy_pass http://api:8000/;

            # Forward the original host header so FastAPI knows the real host
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — give the API time to respond
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ------------------------------------------------------------------
        # Location 2: / — serve static frontend files
        # ------------------------------------------------------------------
        location / {
            root  /usr/share/nginx/html;

            # try_files: look for an exact file match first, then a directory,
            # then fall back to index.html. This supports single-page apps.
            try_files $uri $uri/ /index.html;

            # Cache static files for 1 hour in the browser
            expires 1h;
            add_header Cache-Control "public";
        }
    }
}
