<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOps Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: rgba(255,255,255,0.03);
      --border:  rgba(255,255,255,0.07);
      --text:    #f0f0f0;
      --muted:   #888;
      --faint:   #444;
      --green:   #00ff88;
      --mono:    'Courier New', Courier, monospace;
      --serif:   Georgia, 'Times New Roman', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,136,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
      );
    }

    .container {
      position: relative; z-index: 1;
      max-width: 1100px; margin: 0 auto; padding: 0 24px 80px;
    }

    /* ── Header ── */
    header {
      padding: 60px 0 40px;
      border-bottom: 1px solid #1a1a1a;
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 20px;
    }
    .header-label { font-size: 10px; color: var(--green); letter-spacing: 4px; margin-bottom: 8px; text-transform: uppercase; }
    h1 { font-size: clamp(36px, 6vw, 64px); line-height: 1; font-weight: 900; letter-spacing: -1px; }
    h1 .accent { color: var(--green); }
    h1 .sub { display: block; font-weight: 300; font-size: 0.55em; color: var(--faint); letter-spacing: 2px; margin-top: 4px; }
    .header-count { text-align: right; }
    .header-count .label { font-size: 11px; color: var(--faint); margin-bottom: 4px; }
    .header-count .number { font-size: 48px; font-weight: 900; color: var(--green); line-height: 1; }
    .tagline { margin-top: 24px; max-width: 540px; font-size: 13px; color: var(--muted); line-height: 1.7; font-family: var(--serif); }

    /* ── Controls ── */
    .controls {
      padding: 28px 0; border-bottom: 1px solid #1a1a1a;
      display: flex; flex-wrap: wrap; gap: 16px;
      align-items: center; justify-content: space-between;
    }
    .search-wrap { position: relative; flex: 1 1 220px; max-width: 320px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--faint); pointer-events: none; }
    input[type="text"] {
      width: 100%; background: transparent; border: 1px solid #222;
      padding: 9px 12px 9px 30px; color: #aaa; font-size: 12px;
      font-family: var(--mono); outline: none; border-radius: 2px; transition: border-color .15s;
    }
    input[type="text"]:focus { border-color: var(--green); }

    .sort-group { display: flex; gap: 6px; align-items: center; }
    .sort-label { font-size: 10px; color: var(--faint); letter-spacing: 1px; }
    .btn-sort {
      background: transparent; border: 1px solid #222; color: var(--faint);
      padding: 6px 12px; cursor: pointer; font-size: 10px; font-family: var(--mono);
      letter-spacing: 1px; text-transform: uppercase; border-radius: 2px; transition: all .15s;
    }
    .btn-sort.active { background: rgba(0,255,136,.13); border-color: var(--green); color: var(--green); }

    /* ── Category tabs ── */
    .tabs { display: flex; gap: 4px; padding: 20px 0; flex-wrap: wrap; }
    .tab {
      background: transparent; border: 1px solid #222; color: var(--faint);
      padding: 7px 14px; cursor: pointer; font-size: 11px; font-family: var(--mono);
      letter-spacing: 1px; text-transform: uppercase; border-radius: 2px; transition: all .15s;
    }
    .tab .count { opacity: .5; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 20px 24px;
      position: relative; overflow: hidden;
      transition: background .25s, box-shadow .25s;
      opacity: 0; transform: translateY(12px);
      animation: fadeUp .35s forwards;
    }
    .card:hover { background: rgba(255,255,255,.06); }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-glow { position: absolute; inset: 0; pointer-events: none; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-name { font-weight: 700; font-size: 15px; color: #f0f0f0; letter-spacing: .5px; }
    .badge {
      display: inline-block; font-size: 9px; font-family: var(--mono);
      padding: 2px 7px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase;
      margin-left: 8px; vertical-align: middle;
    }
    .github-stars { font-size: 11px; color: #555; white-space: nowrap; }

    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; font-family: var(--serif); }
    .card-desc.empty { color: var(--faint); font-style: italic; }

    /* ── States ── */
    .empty { text-align: center; padding: 80px 0; color: #333; }
    .empty .icon { font-size: 32px; margin-bottom: 12px; }
    .empty .msg { letter-spacing: 2px; font-size: 12px; }

    .loading { text-align: center; padding: 80px 0; color: var(--green); font-size: 12px; letter-spacing: 2px; }
    .loading::after {
      content: ''; display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: var(--green); margin-left: 8px;
      animation: blink .8s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .error-banner {
      background: rgba(255,60,60,.1); border: 1px solid rgba(255,60,60,.3);
      color: #ff6060; padding: 14px 18px; border-radius: 2px;
      font-size: 12px; margin: 20px 0; line-height: 1.7;
    }
    .error-banner code { background: rgba(255,255,255,.08); padding: 1px 4px; border-radius: 2px; }

    /* ── Footer ── */
    footer {
      margin-top: 60px; padding-top: 24px; border-top: 1px solid #1a1a1a;
      display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    footer span { font-size: 10px; color: #333; letter-spacing: 1px; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="header-label">▸ Open Source Index</div>
      <h1>DEV<span class="accent">OPS</span><span class="sub">TOOLS / INDEXED</span></h1>
      <p class="tagline">
        A curated index of open-source tools used in modern DevOps pipelines —
        from unit testing to observability.
      </p>
    </div>
    <div class="header-count">
      <div class="label">tools indexed</div>
      <div class="number" id="tool-count">—</div>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="search tools or categories…" />
    </div>
    <div class="sort-group">
      <span class="sort-label">SORT</span>
      <button class="btn-sort active" data-sort="stars">stars</button>
      <button class="btn-sort"        data-sort="name">name</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="content"></div>

  <footer>
    <span>DEVOPS/TOOLS — OPEN SOURCE INDEX</span>
    <span id="api-status">API: CHECKING…</span>
  </footer>
</div>

<script>
// =============================================================================
// DevOps Tools — Frontend
//
// Schema reference (GET /api/tools/):
//   id:           string
//   name:         string
//   category:     string
//   description:  string | null
//   github_stars: integer (default 0)
// =============================================================================

const API = '/api';

const CATEGORY_COLORS = {
  Testing:       '#00ff88',
  Containers:    '#00b4ff',
  'CI/CD':       '#ff6b35',
  Observability: '#c77dff',
  IaC:           '#ffd60a',
};

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allTools       = [];
let activeCategory = 'All';
let sortBy         = 'stars';
let searchQuery    = '';

// ---------------------------------------------------------------------------
// API
// ---------------------------------------------------------------------------
async function fetchTools() {
  const res = await fetch(`${API}/tools/`);
  if (!res.ok) throw new Error(`GET /api/tools/ returned ${res.status}`);
  return res.json();
}

async function checkHealth() {
  const el = document.getElementById('api-status');
  try {
    const res  = await fetch(`${API}/health`);
    const data = await res.json();
    el.textContent = data.status === 'ok' ? 'API: ONLINE ▸' : `API: ${data.status.toUpperCase()}`;
    el.style.color = data.status === 'ok' ? '#00ff88' : '#ff6b35';
  } catch {
    el.textContent = 'API: UNREACHABLE';
    el.style.color = '#ff4444';
  }
}

// ---------------------------------------------------------------------------
// Filtering + sorting
// ---------------------------------------------------------------------------
function getVisibleTools() {
  let tools = [...allTools];

  if (activeCategory !== 'All') {
    tools = tools.filter(t => t.category === activeCategory);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    tools = tools.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.category.toLowerCase().includes(q) ||
      (t.description || '').toLowerCase().includes(q)
    );
  }

  tools.sort((a, b) =>
    sortBy === 'name'
      ? a.name.localeCompare(b.name)
      : (b.github_stars || 0) - (a.github_stars || 0)
  );

  return tools;
}

// ---------------------------------------------------------------------------
// Rendering
// ---------------------------------------------------------------------------
function renderTabs() {
  const categories = ['All', ...new Set(allTools.map(t => t.category))];

  document.getElementById('tabs').innerHTML = categories.map(cat => {
    const count  = cat === 'All' ? allTools.length : allTools.filter(t => t.category === cat).length;
    const color  = CATEGORY_COLORS[cat] || '#00ff88';
    const active = cat === activeCategory;
    const style  = active ? `border-color:${color}; color:${color}; background:${color}18;` : '';
    return `<button class="tab" data-cat="${cat}" style="${style}">
      ${esc(cat)} <span class="count">(${count})</span>
    </button>`;
  }).join('');

  document.getElementById('tabs').querySelectorAll('.tab').forEach(btn =>
    btn.addEventListener('click', () => { activeCategory = btn.dataset.cat; renderAll(); })
  );
}

function renderCard(tool, index) {
  const color = CATEGORY_COLORS[tool.category] || '#00ff88';
  const stars = tool.github_stars >= 1000
    ? `★ ${(tool.github_stars / 1000).toFixed(1)}k`
    : tool.github_stars > 0 ? `★ ${tool.github_stars}` : '';

  return `
    <div class="card" style="border-left:3px solid ${color}; animation-delay:${index * 55}ms;"
         onmouseover="this.style.boxShadow='0 0 24px ${color}18'"
         onmouseout="this.style.boxShadow='none'">
      <div class="card-glow" style="background:radial-gradient(circle at 80% 20%,${color}08,transparent 60%)"></div>
      <div class="card-top">
        <div>
          <span class="card-name">${esc(tool.name)}</span>
          <span class="badge" style="background:${color}18; color:${color}; border:1px solid ${color}44;">
            ${esc(tool.category)}
          </span>
        </div>
        <span class="github-stars">${stars}</span>
      </div>
      ${tool.description
        ? `<p class="card-desc">${esc(tool.description)}</p>`
        : `<p class="card-desc empty">No description available.</p>`
      }
    </div>`;
}

function renderGrid() {
  const tools   = getVisibleTools();
  const content = document.getElementById('content');

  if (tools.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="icon">◌</div>
        <div class="msg">NO TOOLS FOUND</div>
      </div>`;
    return;
  }

  content.innerHTML = `<div class="grid">${tools.map(renderCard).join('')}</div>`;
}

function renderAll() {
  document.getElementById('tool-count').textContent = allTools.length;
  renderTabs();
  renderGrid();
}

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ---------------------------------------------------------------------------
// Wire up controls
// ---------------------------------------------------------------------------
document.querySelectorAll('.btn-sort').forEach(btn =>
  btn.addEventListener('click', () => {
    sortBy = btn.dataset.sort;
    document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  })
);

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

// ---------------------------------------------------------------------------
// Bootstrap
// ---------------------------------------------------------------------------
async function init() {
  document.getElementById('content').innerHTML = '<div class="loading">LOADING TOOLS</div>';

  try {
    allTools = await fetchTools();
    renderAll();
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-banner">
        ⚠ Could not load tools from the API.<br/>
        <small>${esc(err.message)}</small><br/>
        <small>Make sure the stack is running: <code>docker compose up</code></small>
      </div>`;
  }

  checkHealth();
  setInterval(checkHealth, 30_000);
}

init();
</script>
</body>
</html>
