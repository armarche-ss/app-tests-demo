services:
  db:
    image: postgres:15-alpine
    container_name: devops_rating_db
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops_rating_api
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: devops_rating
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops_rating_frontend
    ports:
      - "80:80"
    depends_on:
      - api

  tests:
    build:
      context: .
      dockerfile: Dockerfile.tests
    container_name: devops_rating_tests
    environment:
      SMOKE_BASE_URL: http://api:8000
    volumes:
      - ./app:/tests/app:ro
    profiles:
      - testing
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  # Chrome browser driven remotely by the Selenium e2e tests.
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: devops_rating_selenium
    shm_size: 2gb
    profiles:
      - testing

  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    container_name: devops_rating_e2e
    environment:
      # Drive the real nginx frontend so /api calls are same-origin.
      E2E_BASE_URL: http://frontend
      SELENIUM_REMOTE_URL: http://selenium:4444
    profiles:
      - testing
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
      frontend:
        condition: service_started
      selenium:
        condition: service_started


volumes:
  postgres_data:
