[pytest]
# pytest.ini — pytest configuration
# ===================================
# This file configures pytest for the entire project.

# Directories where pytest looks for tests
testpaths = tests

# Show short test summary info for failures
addopts = -ra

# Suppress noisy deprecation warnings from test libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
